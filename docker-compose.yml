services:
  web:
    build:
      context: .
      dockerfile: apps/web/dockerfile
    ports:
      - '3000:3000'
  db:
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
